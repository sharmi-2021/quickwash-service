<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard - QuickWash</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .dashboard { padding: 30px; max-width: 1200px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; border-radius: 16px; padding: 25px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    .stat-card h3 { font-size: 36px; color: #00d4ff; }
    .stat-card p  { color: #718096; margin-top: 5px; }
    table { width: 100%; background: white; border-radius: 16px; border-collapse: collapse; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
    th { background: #1a1a2e; color: white; padding: 15px; text-align: left; }
    td { padding: 12px 15px; border-bottom: 1px solid #f0f4f8; font-size: 14px; }
    tr:hover td { background: #f0f4f8; }
    .badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge.pending  { background: #fff3cd; color: #856404; }
    .badge.done     { background: #d4edda; color: #155724; }
    .badge.paid     { background: #d4edda; color: #155724; }
    .badge.unpaid   { background: #f8d7da; color: #721c24; }
    select.status-select { padding: 6px 10px; border-radius: 8px; border: 1px solid #ddd; cursor: pointer; }
    .map-link { color: #00d4ff; text-decoration: none; font-weight: 600; }
    .tabs { display: flex; gap: 15px; margin-bottom: 25px; }
    .tab { padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 600; border: 2px solid #e2e8f0; background: white; }
    .tab.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="logo">🔧 QuickWash Admin</div>
  <div class="nav-links">
    <a href="index.html">🏠 Website</a>
    <span style="color:#00d4ff;font-weight:600;">📊 Dashboard</span>
  </div>
</nav>

<div class="dashboard">
  <h2 style="margin-bottom:25px;">📊 Dashboard</h2>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card">
      <h3 id="totalCount">0</h3>
      <p>Total Bookings</p>
    </div>
    <div class="stat-card">
      <h3 id="pendingCount">0</h3>
      <p>Pending</p>
    </div>
    <div class="stat-card">
      <h3 id="doneCount">0</h3>
      <p>Completed</p>
    </div>
    <div class="stat-card">
      <h3 id="revenueCount">₹0</h3>
      <p>Total Revenue</p>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="showTab('bookings',this)">📋 All Bookings</div>
    <div class="tab" onclick="showTab('payments',this)">💰 Payment History</div>
  </div>

  <!-- BOOKINGS TABLE -->
  <div id="bookingsTab">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Problem</th>
          <th>Brand</th>
          <th>Date & Slot</th>
          <th>Location</th>
          <th>Payment</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="bookingsTable"></tbody>
    </table>
  </div>

  <!-- PAYMENT HISTORY -->
  <div id="paymentsTab" style="display:none;">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Problem</th>
          <th>Amount</th>
          <th>Payment ID</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="paymentsTable"></tbody>
    </table>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
